{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f7fb">
  <meta name="color-scheme" content="light">
  <title>{% block title %}AURA // LINK{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@25.3.0/build/css/intlTelInput.css">
  <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <div class="bg-orb orb-c"></div>

  <main class="app-shell">
    <header class="app-topbar">
      <div class="brand-lockup">
        <div class="brand-mark">AURA // <span>LINK</span></div>
        <div class="brand-sub">персональная запись для мастеров</div>
      </div>
      <div class="brand-chip"><i class="fa-solid fa-sparkles"></i> mobile first</div>
    </header>

    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}

    {% block content %}{% endblock %}
  </main>


<script>
document.addEventListener('DOMContentLoaded', function () {
  const key = 'aura_scroll_pos';
  const saved = sessionStorage.getItem(key);
  if (saved) {
    window.scrollTo(0, parseInt(saved, 10));
    sessionStorage.removeItem(key);
  }

  document.querySelectorAll('form').forEach(function(form){
    form.addEventListener('submit', function(){
      sessionStorage.setItem(key, window.scrollY);
    });
  });
});
</script>
</body>

</html>
